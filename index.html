<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>내 사이트</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f5f5f5;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>환영합니다!</h1>
    <p>내가 만든 첫 번째 웹사이트입니다.</p>

    <button onclick="hello()">
        클릭하기
    </button>

    <script>
        function hello() {
            alert("안녕하세요!");
        }
    </script>

</body>
</html>
