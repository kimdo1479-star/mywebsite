<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>내 사이트</title>

<style>
body {
    background: linear-gradient(to bottom, #000428, #004e92);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
}

/* 이미지 기본 숨김 */
#popupImg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    width: 250px;
}

/* 나타날 때 */
#popupImg.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
}
</style>

</head>

<body>

<!-- 이미지 (숨김 상태) -->
<img id="popupImg"
src="https://raw.githubusercontent.com/kimdo1479-star/mywebsite/main/%EC%8A%A4%ED%81%AC%EB%A6%B0%EC%83%B7%202026-06-20%20121436.png">

<h1 style="font-size:80px;">ㅎㅅㅇㅌㅌ</h1>

<!-- 버튼 -->
<button onclick="showImage()">
    운지
</button>

<button onclick="location.href='gallery.html'">
    서지훈
</button>

<button onclick="window.location.href='https://hitomi.la'">
    Hitomi 이동
</button>

<script>
function showImage() {
    const img = document.getElementById("popupImg");

    img.classList.add("show");

    setTimeout(() => {
        img.classList.remove("show");
    }, 3000);
}
</script>

</body>
</html>
